<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>TW Golf · 國華球場 Caddie Guide · NBL Consult</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c1a35;--blue:#1e50e2;--green:#15803d;
  --white:#fff;--text:#111827;--muted:#64748b;--border:#e2e8f0;
}
html,body{background:#e8e3da;font-family:'DM Sans',sans-serif;color:var(--text)}

/* NAV */
.nav{position:sticky;top:52px;z-index:50;background:var(--navy);display:flex;
  align-items:center;height:36px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntag{flex-shrink:0;padding:0 8px;font-family:'Bebas Neue',sans-serif;font-size:11px;
  color:rgba(255,255,255,0.28);letter-spacing:.1em;border-right:1px solid rgba(255,255,255,0.08)}
.nb{width:28px;height:36px;border:none;background:transparent;color:rgba(255,255,255,0.35);
  font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  flex-shrink:0;position:relative}
.nb::after{content:'';position:absolute;bottom:0;left:2px;right:2px;height:2px;
  background:var(--blue);opacity:0}
.nb.on{color:#fff}.nb.on::after{opacity:1}

/* HOLE */
.hole{display:none}.hole.on{display:block}

/* OUTER WRAPPER — 8mm margin for print feel on screen too */
.pg{margin:8px;background:var(--white);border-radius:10px;
  overflow:hidden;border:1px solid var(--border)}

/* HEADER — full width dark strip */
.hdr{
  background:var(--navy);
  padding:8px 12px;
  display:flex;justify-content:space-between;align-items:center;
}
.hdr-l{display:flex;align-items:baseline;gap:10px}
.hnum{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:.04em;line-height:1}
.hname{font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(255,255,255,0.6);letter-spacing:.03em}
.hmeta{font-size:9px;color:rgba(255,255,255,0.3);margin-top:1px}
.spill{padding:3px 8px;border-radius:99px;font-size:8px;font-weight:700;letter-spacing:.1em}

/* BODY — strict 50/50 split */
.split{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:0;
}

/* LEFT — image fills full left column */
.img-col{
  overflow:hidden;
  background:#000;
  display:flex;align-items:flex-start;
}
.img-col img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
  display:block;
}

/* RIGHT — all content, small text */
.info-col{
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
  overflow:hidden;
}

/* tee toggle */
.tt{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);flex-shrink:0}
.ttb{flex:1;padding:5px 0;font-size:10px;font-weight:600;border:none;
  background:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;
  color:var(--muted);transition:all .12s;text-align:center;letter-spacing:.03em}
.ttb.bon{background:var(--blue);color:#fff}
.ttb.won{background:#334155;color:#fff}

/* yardage row */
.yrow{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ybig{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;color:var(--navy)}
.yinfo{display:flex;flex-direction:column}
.ylbl{font-size:8px;font-weight:700;letter-spacing:.12em;color:var(--muted)}
.ypar{font-size:9px;color:var(--muted)}

/* aim */
.aim{background:#eff6ff;border-left:2px solid var(--blue);
  border-radius:0 5px 5px 0;padding:5px 7px;flex-shrink:0}
.aimlbl{font-size:7px;font-weight:700;letter-spacing:.12em;color:var(--blue);margin-bottom:2px}
.aimtxt{font-size:10px;font-weight:500;line-height:1.35;color:var(--text)}

/* dist bar */
.blbl{font-size:7px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:3px}
.dbar{height:22px;border-radius:5px;overflow:hidden;display:flex;flex-shrink:0}
.dseg{height:100%;display:flex;align-items:center;justify-content:center;min-width:18px;overflow:hidden}
.dtxt{font-size:7.5px;font-weight:700;color:rgba(255,255,255,0.95);
  white-space:nowrap;padding:0 2px;text-align:center;line-height:1.2}

/* shot rows */
.srows{display:flex;flex-direction:column;gap:2px}
.srow{display:flex;align-items:center;gap:5px;
  padding:3px 6px;background:#f8fafc;border-radius:5px;border:1px solid var(--border)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.scl{font-size:10px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.syd{font-size:10px;font-weight:700;white-space:nowrap}
.srm{font-size:9px;color:var(--muted);white-space:nowrap;margin-left:2px}
.son{font-size:9px;font-weight:600;color:var(--green);white-space:nowrap;margin-left:2px}

/* caddie */
.cad{background:var(--navy);border-radius:6px;padding:6px 8px;flex-shrink:0}
.clbl{font-size:7px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,0.32);margin-bottom:2px}
.ctxt{font-size:9.5px;line-height:1.5;color:rgba(255,255,255,0.88)}

/* green */
.grn{background:#f0fdf4;border-left:2px solid var(--green);
  border-radius:0 5px 5px 0;padding:5px 7px;flex-shrink:0}
.glbl{font-size:7px;font-weight:700;letter-spacing:.14em;color:#15803d;margin-bottom:2px}
.gtxt{font-size:9.5px;line-height:1.45;color:#166534}

/* screen nav */
.foot{display:flex;gap:6px;padding:6px 8px;border-top:1px solid var(--border)}
.fn{flex:1;padding:7px 0;border-radius:7px;border:1px solid var(--border);
  background:var(--white);font-size:11px;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;color:var(--text);text-align:center}
.fn.nx{background:var(--navy);color:#fff;border-color:var(--navy)}
.fn:disabled{opacity:.2;pointer-events:none}

/* PRINT */
@media print{
  @page{margin:6mm;size:A4 portrait}
  html,body{background:#fff}
  .nav,.foot,.tt{display:none!important}
  .hole{display:block!important;page-break-after:always}
  .hole:last-child{page-break-after:avoid}
  .pg{margin:0;border:none;border-radius:0;box-shadow:none}
  /* Force colors */
  .hdr,.cad,.dbar,.dseg,.sdot,.spill,.aim,.grn{
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* Make split fill the page height */
  .split{height:calc(297mm - 32mm)}
}
</style>

function bar(shots,total){
  return shots.map(s=>{
    const l=s.club.length>6?s.club.slice(0,5):s.club;
    return `<div class="dseg" style="flex:${s.used};background:${s.col}">
      <div class="dtxt">${l}<br>${s.used}y</div></div>`;
  }).join('');
}
function rows(shots){
  return shots.map((s,i)=>`
    <div class="srow">
      <div class="sdot" style="background:${s.col}"></div>
      <span class="scl">S${i+1} ${s.club}</span>
      <span class="syd">${s.used}y</span>
      ${s.rem===0?'<span class="son">✓ on</span>':`<span class="srm">→${s.rem}y</span>`}
    </div>`).join('');
}

function hHTML(h,i){
  return `<div class="pg">
  <div class="hdr">
    <div class="hdr-l">
      <span class="hnum">H${h.h}</span>
      <span class="hname">${h.name}</span>
    </div>
    <div style="text-align:right">
      <div class="spill" style="background:${h.sbg};color:${h.sc}">${h.slbl}</div>
      <div class="hmeta">Par ${h.par} · Index ${h.hcp} · 國華球場 · 23 May</div>
    </div>
  </div>

  <div class="split">
    <div class="img-col">
      <img src="data:image/jpeg;base64,${IMGS[i]}" alt="H${h.h}">
    </div>

    <div class="info-col">
      <div class="tt">
        <button class="ttb bon" id="tb${h.h}" onclick="tee(${h.h},'b')">Blue ${h.blue}y</button>
        <button class="ttb" id="tw${h.h}" onclick="tee(${h.h},'w')">White ${h.white}y</button>
      </div>

      <div class="yrow">
        <span class="ybig" id="yn${h.h}">${h.blue}</span>
        <div class="yinfo">
          <span class="ylbl" id="yl${h.h}">BLUE TEES</span>
          <span class="ypar">Par ${h.par}</span>
        </div>
      </div>

      <div class="aim">
        <div class="aimlbl">TEE SHOT AIM</div>
        <div class="aimtxt">${h.aim}</div>
      </div>

      <div>
        <div class="blbl">SHOT SEQUENCE</div>
        <div class="dbar" id="db${h.h}">${bar(h.bs,h.blue)}</div>
        <div class="srows" id="sr${h.h}" style="margin-top:3px">${rows(h.bs)}</div>
      </div>

      <div class="cad">
        <div class="clbl">CADDIE</div>
        <div class="ctxt">${h.caddie}</div>
      </div>

      <div class="grn">
        <div class="glbl">GREEN</div>
        <div class="gtxt">${h.green}</div>
      </div>
    </div>
  </div>

  <div class="foot">
    <button class="fn" onclick="go(${h.h-1})" ${h.h===1?'disabled':''}>← H${h.h>1?h.h-1:1}</button>
    <button class="fn nx" onclick="go(${h.h+1})" ${h.h===18?'disabled':''}>H${h.h<18?h.h+1:18} →</button>
  </div>
</div>`;
}

function buildNav(){
  const d=document.getElementById('nh');
  HOLES.forEach((h,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' on':'');
    b.id='nb'+h.h;b.textContent=h.h;
    b.onclick=()=>go(h.h);d.appendChild(b);
  });
}

function buildHoles(){
  const c=document.getElementById('hc');
  HOLES.forEach((h,i)=>{
    const d=document.createElement('div');
    d.className='hole'+(i===0?' on':'');
    d.id='hole'+h.h;d.innerHTML=hHTML(h,i);
    c.appendChild(d);
  });
}

function go(n){
  if(n<1||n>18)return;
  document.querySelectorAll('.hole').forEach(h=>h.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('hole'+n).classList.add('on');
  document.getElementById('nb'+n).classList.add('on');
  window.scrollTo({top:0,behavior:'instant'});
}

function tee(h,t){
  const hole=HOLES.find(x=>x.h===h);
  const isB=t==='b';
  document.getElementById('tb'+h).className='ttb'+(isB?' bon':'');
  document.getElementById('tw'+h).className='ttb'+(isB?'':' won');
  document.getElementById('yn'+h).textContent=isB?hole.blue:hole.white;
  document.getElementById('yl'+h).textContent=isB?'BLUE TEES':'WHITE TEES';
  document.getElementById('db'+h).innerHTML=bar(isB?hole.bs:hole.ws,isB?hole.blue:hole.white);
  document.getElementById('sr'+h).innerHTML=rows(isB?hole.bs:hole.ws);
}

buildNav();
buildHoles();
</script>
